<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ══════════════════════════════════════════
       SEO — Meta tags estáticos
       Visíveis a TODOS os crawlers, mesmo sem JS.
       Editar os valores entre aspas.
       ══════════════════════════════════════════ -->

  <title>Nau Contraluz · DC</title>
  <meta name="description"
        content="O que vês e o que lês não se explicam mutuamente. Apenas ressoam. Entra e experimenta." />
  <meta name="author"      content="DC" />
  <meta name="robots"      content="index, follow" />
  <link rel="canonical"    href="https://naucontraluz.diogocarmo.cc/" />

  <!-- ── Open Graph (partilha em redes sociais) ── -->
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="Nau Contraluz" />
  <meta property="og:title"       content="Nau Contraluz · DC" />
  <meta property="og:description" content="O que vês e o que lês não se explicam mutuamente. Apenas ressoam. Entra e experimenta." />
  <meta property="og:url"         content="https://naucontraluz.diogocarmo.cc/" />
  <meta property="og:image"       content="https://naucontraluz.diogocarmo.cc/assets/img/preview.jpg" />
  <meta property="og:locale"      content="pt_PT" />

  <!-- ── Twitter/X Card ── -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Nau Contraluz · DC" />
  <meta name="twitter:description" content="O que vês e o que lês não se explicam mutuamente. Apenas ressoam. Entra e experimenta." />
  <meta name="twitter:image"       content="https://naucontraluz.diogocarmo.cc/assets/img/preview.jpg" />

  <!-- ══════════════════════════════════════════
       GEO — Schema.org estático mínimo
       JSON-LD completo injetado por seo.js após
       fetch. Este bloco garante indexação mesmo
       sem execução de JS.
       ══════════════════════════════════════════ -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ImageGallery",
    "name": "Nau Contraluz",
    "description": "O que vês e o que lês não se explicam mutuamente. Apenas ressoam. Entra e experimenta.",
    "url": "https://naucontraluz.diogocarmo.cc/",
    "author": {
      "@type": "Person",
      "name": "DC"
    }
  }
  </script>

  <!-- ══════════════════════════════════════════
       FAVICON
       ══════════════════════════════════════════ -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <!-- ══════════════════════════════════════════
       LICENÇA
       ══════════════════════════════════════════ -->
  <link rel="license" href="https://creativecommons.org/licenses/by-nc-nd/4.0/" />

  <!-- ══════════════════════════════════════════
       FONTES — preconnect para reduzir latência
       ══════════════════════════════════════════ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- ══════════════════════════════════════════
       CSS — ordem de carregamento importa
       ══════════════════════════════════════════ -->
  <link rel="stylesheet" href="assets/css/reset.css" />
  <link rel="stylesheet" href="assets/css/gallery.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />

</head>
<body>

  <!-- ══════════════════════════════════════════
       CABEÇALHO FLUTUANTE
       ══════════════════════════════════════════ -->
  <header id="cabecalho" role="banner" aria-label="Cabeçalho da galeria">
    <h1>Nau Contraluz</h1>
    <div class="cabecalho-sep" aria-hidden="true"></div>
    <p>O que vês e o que lês não se explicam mutuamente. Apenas ressoam.</p>
  </header>
  <div id="cabecalho-trigger" aria-hidden="true"></div>

  <!-- ══════════════════════════════════════════
       ACESSIBILIDADE — skip link
       ══════════════════════════════════════════ -->
  <a href="#gallery" class="skip-link">Saltar para a galeria</a>

  <!-- ══════════════════════════════════════════
       GALERIA
       ══════════════════════════════════════════ -->
  <main>

    <!-- Loader — visível durante fetch -->
    <div id="loader" role="status" aria-label="A carregar galeria"></div>

    <!-- Mensagem de erro — visível se fetch falhar -->
    <p id="error-msg" role="alert"></p>

    <!-- Grid de cartões — preenchido por gallery.js -->
    <section
      id="gallery"
      aria-label="Galeria fotográfica"
    ></section>

    <!-- Sentinel — âncora do IntersectionObserver -->
    <div id="sentinel" aria-hidden="true"></div>

  </main>

  <!-- ══════════════════════════════════════════
       JS — ordem obrigatória:
       1. config   (variáveis globais)
       2. seo      (função injectStructuredData)
       3. api      (função fetchFotos — chama CONFIG)
       4. gallery  (init — chama fetchFotos + injectStructuredData)
       ══════════════════════════════════════════ -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/seo.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/gallery.js"></script>

</body>
</html>
